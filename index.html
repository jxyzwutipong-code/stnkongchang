<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบติดตามคำร้อง กองช่าง เทศบาลเมืองสะเตงนอก</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Prompt', 'sans-serif'] }, colors: { brand: { dark: '#0f3c25', DEFAULT: '#145A32', light: '#1e8449', accent: '#A9DFBF', bg: '#F2F9F4' } } } } }
    </script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #F2F9F4; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen w-full overflow-hidden flex flex-col">

    <div id="toast-container" class="fixed bottom-5 right-5 z-[100] flex flex-col gap-2"></div>

    <!-- Login View -->
    <div id="login-view" class="h-full w-full flex items-center justify-center p-4 bg-gradient-to-tr from-brand-light via-brand to-brand-accent">
        <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8">
            <h1 class="text-2xl font-black text-brand text-center mb-6">กองช่าง ทม.สะเตงนอก</h1>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Username</label>
                    <input type="text" id="login-username" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 outline-none" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Password</label>
                    <input type="password" id="login-password" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 outline-none" required>
                </div>
                <button type="submit" class="w-full bg-brand hover:bg-brand-dark text-white font-bold py-3 rounded-xl transition-all">เข้าสู่ระบบ</button>
            </form>
        </div>
    </div>

    <!-- App Layout -->
    <div id="app-layout" class="hidden h-full w-full flex flex-col md:flex-row bg-brand-bg">
        <main class="flex-1 overflow-y-auto hide-scroll p-4 md:p-8">
            <!-- Content will be rendered here by JS -->
            <div id="view-dashboard" class="max-w-4xl mx-auto">
                <h2 class="text-2xl font-bold mb-6">แดชบอร์ดคำร้อง</h2>
                <div id="complaints-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
            <div id="view-form" class="hidden max-w-4xl mx-auto">
                <h2 class="text-2xl font-bold mb-6" id="form-title">บันทึกข้อมูล</h2>
                <form id="complaint-form" class="bg-white p-6 rounded-3xl space-y-4 shadow-sm border border-emerald-100">
                    <input type="hidden" id="entry-id">
                    <div><label class="block text-xs font-bold uppercase mb-1">ชื่อเรื่อง</label><input type="text" id="f-title" required class="w-full px-4 py-2 border rounded-xl"></div>
                    <div><label class="block text-xs font-bold uppercase mb-1">เลขรับ</label><input type="text" id="f-receiveNo" class="w-full px-4 py-2 border rounded-xl"></div>
                    <div><label class="block text-xs font-bold uppercase mb-1">ชื่อผู้ร้องเรียน / ผู้แจ้ง</label><input type="text" id="f-requester" required class="w-full px-4 py-2 border rounded-xl"></div>
                    <div><label class="block text-xs font-bold uppercase mb-1">ผู้ดูแลงาน</label><input type="text" id="f-supervisor" required class="w-full px-4 py-2 border rounded-xl"></div>
                    
                    <div>
                        <label class="block text-xs font-bold uppercase mb-1">หน่วยงาน</label>
                        <select id="f-department" required class="w-full px-4 py-2 border rounded-xl">
                            <option value="">-- กรุณาเลือกหน่วยงาน --</option>
                            <option value="งานโยธา">งานโยธา</option>
                            <option value="ฝ่ายแผน">ฝ่ายแผน</option>
                        </select>
                    </div>
                    <div id="sub-department-container" class="hidden">
                        <label class="block text-xs font-bold uppercase mb-1">หน่วยย่อย (งานโยธา)</label>
                        <select id="f-subDepartment" class="w-full px-4 py-2 border rounded-xl">
                            <option value="ชุดซ่อมปะถนน">ชุดซ่อมปะถนน</option>
                            <option value="ชุด LCB">ชุด LCB</option>
                            <option value="ชุดตัดหญ้า">ชุดตัดหญ้า</option>
                            <option value="ชุดไฟฟ้า">ชุดไฟฟ้า</option>
                        </select>
                    </div>

                    <div><label class="block text-xs font-bold uppercase mb-1">วันที่รับเรื่อง</label><input type="date" id="f-startDate" required class="w-full px-4 py-2 border rounded-xl"></div>
                    
                    <div>
                        <label class="block text-xs font-bold uppercase mb-1">ช่องทางการติดต่อผู้แจ้ง</label>
                        <select id="f-contactType" class="w-full px-4 py-2 border rounded-xl">
                            <option value="เบอร์โทรศัพท์">เบอร์โทรศัพท์</option>
                            <option value="LINE ID">LINE ID</option>
                            <option value="อื่น ๆ">อื่น ๆ</option>
                        </select>
                        <input type="text" id="f-contactInfo" required class="w-full px-4 py-2 border rounded-xl mt-2" placeholder="กรอกข้อมูลติดต่อ">
                    </div>

                    <div><label class="block text-xs font-bold uppercase mb-1">ภาพถ่ายสภาพปัญหาก่อนดำเนินการ</label><input type="file" id="f-beforeFile" accept="image/*" class="w-full"></div>
                    
                    <div>
                        <label class="block text-xs font-bold uppercase mb-1">ความคืบหน้า</label>
                        <select id="f-status" class="w-full px-4 py-2 border rounded-xl">
                            <option value="ยังไม่เริ่ม">ยังไม่เริ่ม</option>
                            <option value="กำลังดำเนินการ">กำลังดำเนินการ</option>
                            <option value="เสร็จสมบูรณ์แล้ว">เสร็จสมบูรณ์แล้ว</option>
                        </select>
                    </div>

                    <div id="note-container" class="hidden"><label class="block text-xs font-bold uppercase mb-1">หมายเหตุ</label><textarea id="f-note" class="w-full px-4 py-2 border rounded-xl"></textarea></div>
                    <div id="finished-container" class="hidden">
                        <label class="block text-xs font-bold uppercase mb-1">วันที่งานเสร็จ</label>
                        <input type="date" id="f-completedDate" class="w-full px-4 py-2 border rounded-xl">
                        <label class="block text-xs font-bold uppercase mt-2 mb-1">ภาพถ่ายหลักฐาน</label>
                        <input type="file" id="f-afterFile" accept="image/*" class="w-full">
                    </div>

                    <button type="submit" class="w-full bg-brand text-white py-3 rounded-xl font-bold">บันทึกข้อมูล</button>
                </form>
            </div>
        </main>
    </div>

    <script>
        const GOOGLE_SHEET_URL = ""; 

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('login-username').value;
            const pass = document.getElementById('login-password').value;
            if (user === 'kongchang' && pass === 'ytctest2026') {
                sessionStorage.setItem('isLoggedIn', 'true');
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('app-layout').classList.remove('hidden');
            } else {
                alert('ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง');
            }
        });

        // Add form logic here (as previously discussed)...
    </script>
</body>
</html>
